<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pornhub Demo</title>
    <style>
      :root {
        --bg: #0b0b0b;
        --bar: #0d0d0d;
        --bar-deep: #000;
        --search: #242424;
        --search-border: #343434;
        --text: #f6f6f6;
        --muted: #b8b8b8;
        --dim: #737373;
        --orange: #f99a21;
        --header-desktop: 168px;
        --header-mobile: 208px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #071017;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-rows: var(--header-desktop) minmax(0, 1fr);
        height: 100vh;
        height: 100dvh;
      }

      .site-header {
        min-width: 0;
        background: var(--bar);
        border-bottom: 1px solid #1b1b1b;
      }

      .topbar {
        display: grid;
        grid-template-columns: 38px 150px minmax(300px, 820px) auto 38px;
        align-items: center;
        gap: 30px;
        width: min(100%, 1760px);
        height: 104px;
        margin: 0 auto;
        padding: 0 42px;
      }

      .icon-button,
      .profile-button {
        display: inline-grid;
        place-items: center;
        border: 0;
        background: transparent;
        color: var(--text);
        text-decoration: none;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        color: var(--orange);
      }

      .icon-button svg,
      .profile-button svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .caret {
        width: 0;
        height: 0;
        border-top: 5px solid currentColor;
        border-right: 5px solid transparent;
        border-left: 5px solid transparent;
        color: #f2f2f2;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        width: 150px;
        height: 44px;
      }

      .brand img {
        display: block;
        width: 150px;
        height: auto;
      }

      .search {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        width: 100%;
        max-width: 820px;
        min-width: 0;
        height: 64px;
        border: 2px solid var(--search-border);
        border-radius: 34px;
        background: var(--search);
        color: rgba(255, 255, 255, 0.52);
      }

      .search svg {
        width: 30px;
        height: 30px;
        margin-left: 27px;
        stroke: #f1f1f1;
      }

      .search span {
        min-width: 0;
        overflow: hidden;
        padding: 0 22px;
        color: #f1f1f1;
        font-size: 23px;
        white-space: nowrap;
      }

      .casino-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        height: 54px;
        min-width: 154px;
        max-width: 170px;
        padding: 0 16px;
        border: 3px solid #191919;
        border-radius: 999px;
        background: var(--orange);
        color: #111;
        font-size: 16px;
        font-weight: 900;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.16);
      }

      .info-dot {
        display: inline-grid;
        place-items: center;
        width: 23px;
        height: 23px;
        border: 2px solid rgba(0, 0, 0, 0.34);
        border-radius: 999px;
        color: rgba(0, 0, 0, 0.42);
        font-size: 15px;
        font-style: italic;
        font-weight: 900;
        line-height: 1;
      }

      .info-icon {
        display: block;
        width: 18px;
        height: 18px;
        color: #6c6c6c;
      }

      .profile-button {
        width: 34px;
        height: 34px;
        margin-left: 12px;
        color: #d8d8d8;
      }

      .subbar {
        display: flex;
        align-items: end;
        justify-content: center;
        height: 64px;
        padding: 0;
        background: var(--bar);
        border-top: 1px solid #161616;
      }

      .subbar-inner {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        width: min(100%, 1860px);
        height: 100%;
        margin: 0 auto;
        padding: 0 56px;
      }

      .nav-link {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 0;
        height: 64px;
        overflow: hidden;
        color: #efefef;
        font-size: 12px;
        font-weight: 900;
        text-decoration: none;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .nav-link .caret {
        border-top-width: 4px;
        border-right-width: 4px;
        border-left-width: 4px;
      }

      .demo-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #071017;
      }

      @media (max-width: 1320px) {
        .topbar {
          grid-template-columns: auto minmax(130px, 150px) minmax(260px, 1fr) auto auto;
          gap: 18px;
          padding-inline: 24px;
        }

        .brand {
          width: 150px;
        }

        .brand img {
          width: 150px;
        }

        .subbar-inner {
          grid-template-columns: repeat(5, minmax(0, 1fr));
          padding-inline: 24px;
        }

        .nav-link:nth-child(n + 6) {
          display: none;
        }
      }

      @media (max-width: 980px) {
        .topbar {
          grid-template-columns: auto minmax(120px, 150px) minmax(180px, 1fr) auto;
          gap: 14px;
          padding-inline: 16px;
        }

        .casino-pill {
          display: none;
        }

        .brand {
          width: 134px;
        }

        .brand img {
          width: 134px;
        }

        .search {
          height: 54px;
        }

        .casino-pill {
          min-width: 146px;
          height: 52px;
          padding: 0 14px;
          font-size: 16px;
        }
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-rows: var(--header-mobile) minmax(0, 1fr);
        }

        .topbar {
          grid-template-columns: auto 1fr auto;
          grid-template-rows: 74px 62px;
          gap: 0 14px;
          height: 136px;
          padding: 0 16px 10px;
        }

        .brand {
          width: 132px;
        }

        .brand img {
          width: 132px;
        }

        .icon-button {
          width: 32px;
          height: 32px;
        }

        .search {
          grid-column: 1 / -1;
          grid-row: 2;
          height: 52px;
          border-radius: 26px;
        }

        .casino-pill {
          display: none;
        }

        .subbar-inner {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          height: 52px;
          padding-inline: 0;
        }

        .nav-link {
          height: 52px;
          gap: 5px;
          padding-inline: 4px;
          font-size: 12px;
        }

        .nav-link:nth-child(n + 4) {
          display: none;
        }
      }

      @media (max-width: 430px) {
        .brand {
          width: 118px;
        }

        .brand img {
          width: 118px;
        }

        .profile-button {
          width: 32px;
          height: 32px;
          margin-left: 0;
        }

        .nav-link {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="site-header" aria-label="Pornhub demo header">
        <div class="topbar">
          <a class="icon-button" href="#" aria-label="Menu">
            <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" aria-hidden="true">
              <path d="M5 8h22M5 16h22M5 24h22" />
            </svg>
          </a>

          <a class="brand" href="#" aria-label="Pornhub">
            <img src="assets/partners/pornhub-logo.svg" alt="Pornhub" width="150" height="43" />
          </a>

          <div class="search" role="search" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m16.5 16.5 5 5"></path>
            </svg>
            <span>Search Pornhub</span>
          </div>

          <a class="casino-pill" href="#">Top Casinos</a>

          <a class="profile-button" href="#" aria-label="Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="8" r="4" />
              <path d="M4 21a8 8 0 0 1 16 0" />
            </svg>
          </a>
        </div>

        <nav class="subbar" aria-label="Main navigation">
          <div class="subbar-inner">
            <a class="nav-link active" href="#">Home</a>
            <a class="nav-link" href="#">Porn Videos <span class="caret" aria-hidden="true"></span></a>
            <a class="nav-link" href="#">Categories <span class="caret" aria-hidden="true"></span></a>
            <a class="nav-link" href="#">
              Livechatt
              <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
              </svg>
            </a>
            <a class="nav-link" href="#">Pornstars <span class="caret" aria-hidden="true"></span></a>
            <a class="nav-link" href="#">
              Sexdejter
              <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
              </svg>
            </a>
            <a class="nav-link" href="#">Community <span class="caret" aria-hidden="true"></span></a>
            <a class="nav-link" href="#">Photos &amp; Gifs <span class="caret" aria-hidden="true"></span></a>
          </div>
        </nav>
      </header>

      <iframe
        class="demo-frame"
        title="Top Casinos campaign"
        src="iframe.html"
        allow="fullscreen; clipboard-read; clipboard-write"
      ></iframe>

    </div>
  </body>
</html>
