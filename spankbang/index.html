<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpankBang Demo</title>
    <style>
      :root {
        --red-top: #691105;
        --red-dark: #3a0501;
        --nav: #101a23;
        --nav-border: #24313b;
        --text: #fff;
        --muted: #c8ced4;
        --dim: #8d98a2;
        --accent: #ff2d65;
        --gold: #ffb312;
        --button-a: #ffd229;
        --button-b: #ff9822;
        --header-desktop: 104px;
        --header-mobile: 184px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #071017;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-rows: var(--header-desktop) minmax(0, 1fr);
        height: 100vh;
        height: 100dvh;
      }

      .site-header {
        min-width: 0;
        background: var(--nav);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .topbar {
        display: grid;
        grid-template-columns: auto auto auto minmax(260px, 930px) auto auto auto;
        align-items: center;
        gap: 18px;
        height: 60px;
        padding: 0 52px;
        background: linear-gradient(180deg, #7a1809 0%, #5a1005 100%);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        color: var(--text);
        text-decoration: none;
        white-space: nowrap;
      }

      .brand-logo {
        display: block;
        width: 194px;
        height: auto;
      }

      .locale,
      .gender {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        border: 0;
        padding: 0;
        background: transparent;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        white-space: nowrap;
      }

      .gender {
        gap: 14px;
        color: #ef5f78;
        font-size: 16px;
      }

      .chevron {
        width: 0;
        height: 0;
        border-top: 6px solid currentColor;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        color: rgba(255, 255, 255, 0.82);
      }

      .search {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        height: 42px;
        min-width: 0;
        border-radius: 6px;
        background: rgba(53, 5, 0, 0.9);
        color: rgba(255, 255, 255, 0.55);
      }

      .search span {
        min-width: 0;
        overflow: hidden;
        padding: 0 20px;
        font-size: 18px;
        font-weight: 400;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search svg {
        width: 24px;
        height: 24px;
        margin-right: 22px;
        stroke: rgba(255, 255, 255, 0.56);
      }

      .ai-link,
      .login-link,
      .signup-link,
      .upload-mobile,
      .gold-mobile {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 400;
        text-decoration: none;
        white-space: nowrap;
      }

      .ai-link {
        gap: 8px;
        font-size: 17px;
      }

      .login-link {
        font-size: 17px;
      }

      .signup-link {
        min-width: 190px;
        height: 38px;
        border-radius: 6px;
        background: linear-gradient(180deg, var(--button-a), var(--button-b));
        color: #2e1102;
        font-size: 16px;
        font-weight: 900;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
      }

      .subbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 44px;
        padding: 0 54px;
        border-bottom: 1px solid var(--nav-border);
        background: var(--nav);
      }

      .nav-links {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 18px;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #98a4ae;
        font-size: 14px;
        font-weight: 400;
        text-decoration: none;
        white-space: nowrap;
      }

      .nav-link.gold {
        color: #e8a10a;
      }

      .nav-link.active {
        color: #dce2e7;
      }

      .nav-link.active {
        position: relative;
      }

      .nav-link.active::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -15px;
        left: 0;
        height: 2px;
        background: var(--accent);
      }

      .demo-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }

      .mobile-actions,
      .mobile-tabs {
        display: none;
      }

      @media (max-width: 1300px) {
        .topbar {
          grid-template-columns: auto auto minmax(240px, 1fr) auto auto auto;
          gap: 18px;
          padding: 0 28px;
        }

        .gender {
          display: none;
        }

        .subbar {
          padding: 0 28px;
        }

        .nav-links {
          gap: 18px;
        }

        .nav-link {
          font-size: 16px;
        }
      }

      @media (max-width: 980px) {
        body {
          overflow: hidden;
        }

        .shell {
          grid-template-rows: var(--header-mobile) minmax(0, 1fr);
        }

        .site-header {
          height: var(--header-mobile);
          overflow: hidden;
        }

        .topbar {
          display: grid;
          grid-template-columns: 1fr auto;
          grid-template-rows: 56px 66px;
          gap: 0 8px;
          height: 132px;
          padding: 0 18px 10px;
          background: linear-gradient(180deg, #7a1809 0%, #681207 100%);
        }

        .brand {
          align-self: center;
        }

        .brand-logo {
          width: 194px;
        }

        .locale,
        .gender,
        .ai-link,
        .login-link,
        .signup-link {
          display: none;
        }

        .mobile-actions {
          display: flex;
          align-items: center;
          justify-content: flex-end;
          gap: 8px;
        }

        .gold-mobile,
        .upload-mobile {
          height: 44px;
          border-radius: 6px;
          background: rgba(55, 4, 0, 0.82);
          font-size: 19px;
          font-weight: 500;
        }

        .gold-mobile {
          width: 96px;
          color: #ffd326;
        }

        .upload-mobile {
          width: 88px;
          color: #fff;
        }

        .search {
          grid-column: 1 / -1;
          height: 56px;
          border-radius: 6px;
        }

        .search span {
          visibility: hidden;
          padding: 0;
        }

        .search svg {
          width: 31px;
          height: 31px;
          margin-right: 26px;
        }

        .subbar {
          display: block;
          height: 52px;
          padding: 0;
          border-bottom-color: #34414a;
        }

        .nav-links {
          display: none;
        }

        .mobile-tabs {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          align-items: center;
          height: 52px;
        }

        .mobile-tab {
          position: relative;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 9px;
          height: 52px;
          color: #d4dae0;
          font-size: 17px;
          font-weight: 400;
          text-decoration: none;
          white-space: nowrap;
        }

        .mobile-tab.active::after {
          content: "";
          position: absolute;
          right: 12px;
          bottom: 0;
          left: 12px;
          height: 3px;
          background: var(--accent);
        }
      }

      @media (max-width: 430px) {
        :root {
          --header-mobile: 184px;
        }

        .topbar {
          padding-inline: 18px;
        }

        .brand-logo {
          width: 186px;
        }

        .gold-mobile,
        .upload-mobile {
          width: auto;
          padding: 0 12px;
          font-size: 16px;
        }

        .mobile-tab {
          gap: 7px;
          font-size: 16px;
        }
      }

      @media (max-width: 370px) {
        .brand-logo {
          width: 170px;
        }

        .gold-mobile,
        .upload-mobile {
          padding: 0 11px;
          font-size: 15px;
        }

        .mobile-tab {
          font-size: 14px;
        }
      }
    </style>
  </head>
